<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Mahjong Demo</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#1a1a1a,#000);
  color:white;
  text-align:center;
}
h1{color:gold;margin-top:20px;}
#saldo{margin:10px;font-size:18px;}
#multiplier{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:10px;
}
.multi{
  padding:8px 15px;
  background:#222;
  border-radius:10px;
}
.active{
  background:gold;
  color:black;
}
.grid{
  display:grid;
  grid-template-columns:repeat(5,70px);
  gap:8px;
  justify-content:center;
  margin:20px 0;
}
.cell{
  width:70px;
  height:70px;
  background:#111;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 0 8px gold;
}
button{
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:gold;
  font-weight:bold;
  margin:5px;
}
#hasil{
  height:25px;
  margin-top:10px;
  font-weight:bold;
}
.winflash{
  animation:flash 0.4s infinite alternate;
}
@keyframes flash{
  from{box-shadow:0 0 5px gold;}
  to{box-shadow:0 0 20px red;}
}
</style>
</head>
<body>

<h1>🐉 Dragon Mahjong Demo</h1>
<div id="saldo">Saldo: Rp 100.000</div>

<div id="multiplier">
  <div class="multi" id="m1">x1</div>
  <div class="multi" id="m2">x2</div>
  <div class="multi" id="m3">x3</div>
  <div class="multi" id="m5">x5</div>
</div>

<div class="grid" id="grid"></div>

<button onclick="spin()">SPIN</button>
<button onclick="autoSpin()">AUTO</button>

<div id="hasil"></div>

<script>
let saldo=100000;
let bet=5000;
let auto=false;
const symbols=["🐉","💎","🔥","🀄","⚡"];
const grid=document.getElementById("grid");

function format(n){return n.toLocaleString("id-ID");}

function createGrid(){
  grid.innerHTML="";
  for(let i=0;i<15;i++){
    let div=document.createElement("div");
    div.className="cell";
    div.innerText=symbols[Math.floor(Math.random()*symbols.length)];
    grid.appendChild(div);
  }
}
createGrid();

function randomMultiplier(){
  document.querySelectorAll(".multi").forEach(m=>m.classList.remove("active"));
  let arr=[1,2,3,5];
  let pick=arr[Math.floor(Math.random()*arr.length)];
  document.getElementById("m"+pick).classList.add("active");
  return pick;
}

function spin(){
  if(saldo<=0) saldo=100000;
  saldo-=bet;

  let multiplier=randomMultiplier();
  createGrid();

  setTimeout(checkWin,400,multiplier);
}

function checkWin(multiplier){
  let cells=document.querySelectorAll(".cell");
  let countDragon=0;

  cells.forEach(c=>{
    c.classList.remove("winflash");
    if(c.innerText=="🐉") countDragon++;
  });

  let win=0;
  if(countDragon>=4){
    win=bet*multiplier*3;
    cells.forEach(c=>{if(c.innerText=="🐉") c.classList.add("winflash");});
    cascade();
  }

  saldo+=win;
  document.getElementById("saldo").innerText="Saldo: Rp "+format(saldo);
  document.getElementById("hasil").innerText=win>0?
  "🐉 Naga Combo! + Rp "+format(win):
  "❌ Tidak menang";

  if(auto) setTimeout(spin,800);
}

function cascade(){
  let cells=document.querySelectorAll(".cell");
  cells.forEach(c=>{
    if(c.classList.contains("winflash")){
      c.innerText=symbols[Math.floor(Math.random()*symbols.length)];
      c.classList.remove("winflash");
    }
  });
}

function autoSpin(){
  auto=!auto;
  if(auto) spin();
}
</script>

</body>
</html>
