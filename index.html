<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Mahjong Gold Demo</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#7a0000,#300000);
  color:white;
  text-align:center;
}
header{
  background:linear-gradient(to right,#b8860b,#ffd700,#b8860b);
  padding:10px;
  color:black;
  font-weight:bold;
}
#saldo{
  margin:10px;
  font-size:18px;
}
#multibar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:10px;
}
.multi{
  padding:6px 12px;
  background:#600000;
  border-radius:10px;
}
.active{
  background:gold;
  color:black;
}
.grid{
  display:grid;
  grid-template-columns:repeat(5,65px);
  gap:6px;
  justify-content:center;
  margin:15px 0;
}
.cell{
  width:65px;
  height:65px;
  background:#fff8dc;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:black;
  box-shadow:0 0 5px gold;
  transition:0.3s;
}
.win{
  animation:flash 0.4s infinite alternate;
}
@keyframes flash{
  from{box-shadow:0 0 5px gold;}
  to{box-shadow:0 0 20px red;}
}
button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:gold;
  font-weight:bold;
  margin:5px;
}
#hasil{
  height:25px;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>
<body>

<header>🐉 DRAGON MAHJONG GOLD DEMO</header>
<div id="saldo">Saldo: Rp 100.000</div>

<div id="multibar">
  <div class="multi" id="m1">x1</div>
  <div class="multi" id="m2">x2</div>
  <div class="multi" id="m3">x3</div>
  <div class="multi" id="m5">x5</div>
</div>

<div class="grid" id="grid"></div>

<button onclick="spin()">SPIN</button>
<button onclick="autoSpin()">AUTO</button>
<button onclick="turboMode()">TURBO</button>

<div id="hasil"></div><script>
let saldo = 100000;
let bet = 1000;
let freeSpin = 0;
let turbo = false;
let comboMulti = 1;

const symbols = ["🀄","💰","🐉","🔔","🧧","👑","💎"];
const wild = "⭐";
const scatter = "🔥";

const gridEl = document.getElementById("grid");
const saldoEl = document.getElementById("saldo");
const hasilEl = document.getElementById("hasil");

function updateSaldo(){
  saldoEl.innerText = "Saldo: Rp " + saldo.toLocaleString();
  if(saldo <= 0){
    saldo = 100000;
    alert("Saldo habis! Reset ke Rp100.000");
  }
}

function randomSymbol(){
  let r = Math.random();
  if(r < 0.05) return scatter;
  if(r < 0.12) return wild;
  return symbols[Math.floor(Math.random()*symbols.length)];
}

function generateGrid(){
  gridEl.innerHTML = "";
  let grid = [];
  for(let i=0;i<30;i++){
    let sym = randomSymbol();
    grid.push(sym);
    let div = document.createElement("div");
    div.className="cell";
    div.innerText=sym;
    gridEl.appendChild(div);
  }
  return grid;
}

function checkScatter(grid){
  let count = grid.filter(s=>s===scatter).length;
  if(count >= 3){
    freeSpin += 8;
    hasilEl.innerText="🔥 3 Scatter! +8 Free Spins!";
  }
}

function getRandomMulti(){
  let arr=[1,2,3,5];
  return arr[Math.floor(Math.random()*arr.length)];
}

function highlightMulti(x){
  document.querySelectorAll(".multi").forEach(m=>m.classList.remove("active"));
  document.getElementById("m"+x).classList.add("active");
}

function checkWin(grid){
  let win=0;
  let counted={};
  grid.forEach(s=>{
    if(s!==scatter){
      counted[s]=(counted[s]||0)+1;
    }
  });

  for(let key in counted){
    if(counted[key]>=4){
      win += bet * (counted[key]/4);
    }
  }

  if(win>0){
    let randMulti = getRandomMulti();
    highlightMulti(randMulti);
    comboMulti += 0.5;
    win = win * randMulti * comboMulti;
    saldo += win;
    hasilEl.innerText="Menang Rp "+Math.floor(win);
    cascade();
  }else{
    comboMulti=1;
    hasilEl.innerText="Tidak menang";
  }
}

function cascade(){
  setTimeout(()=>{
    let cells=document.querySelectorAll(".cell");
    cells.forEach(c=>c.classList.add("win"));
    setTimeout(()=>{
      cells.forEach(c=>c.classList.remove("win"));
    },400);
  },300);
}

function spin(){
  if(freeSpin===0){
    if(saldo<bet){
      alert("Saldo tidak cukup!");
      return;
    }
    saldo-=bet;
  }else{
    freeSpin--;
    hasilEl.innerText="Free Spin tersisa: "+freeSpin;
  }

  let grid = generateGrid();
  checkScatter(grid);
  checkWin(grid);
  updateSaldo();

  if(turbo && freeSpin>0){
    setTimeout(spin,200);
  }
}

function autoSpin(){
  let interval = turbo?200:800;
  let i=0;
  let auto = setInterval(()=>{
    spin();
    i++;
    if(i>20) clearInterval(auto);
  },interval);
}

function turboMode(){
  turbo = !turbo;
  alert("Turbo "+(turbo?"ON":"OFF"));
}

updateSaldo();
generateGrid();
</script>

</body>
</html>
